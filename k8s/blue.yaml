apiVersion: apps/v1
kind: Deployment

metadata:
  name: demo-blue

spec:

  replicas: 2

  selector:
    matchLabels:
      app: blue

  template:

    metadata:
      labels:
        app: blue

    spec:

      containers:

      - name: nginx

        image: 269523617138.dkr.ecr.us-east-1.amazonaws.com/demo-app:v1

        ports:
        - containerPort: 80
