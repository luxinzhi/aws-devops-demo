apiVersion: apps/v1
kind: Deployment

metadata:
  name: demo-green

spec:

  replicas: 2

  selector:
    matchLabels:
      app: green

  template:

    metadata:
      labels:
        app: green

    spec:

      containers:

      - name: nginx

        image: 269523617138.dkr.ecr.us-east-1.amazonaws.com/demo-app:IMAGE_TAG

        ports:
        - containerPort: 80
